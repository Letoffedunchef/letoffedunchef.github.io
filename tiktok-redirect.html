<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Autorisation TikTok — Etoffe Shorts Uploader</title>
<style>
  body{font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       max-width:640px;margin:60px auto;padding:0 20px;color:#1a1a1a;text-align:center}
  h1{font-size:1.4rem}
  .box{background:#f4f4f4;border-radius:10px;padding:20px;margin:24px 0;word-break:break-all;
       font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.95rem}
  button{font-size:1rem;padding:10px 20px;border:0;border-radius:8px;background:#fe2c55;
         color:#fff;cursor:pointer}
  button:hover{background:#e0244a}
  .ok{color:#0a7d28} .err{color:#c00}
  .hint{color:#666;font-size:.9rem;margin-top:20px}
</style>
</head>
<body>
<h1>Autorisation TikTok</h1>
<div id="content">Lecture du code…</div>
<p class="hint">Cette page fait partie de l'outil interne « Etoffe Shorts Uploader ».
Copie le code ci-dessus et colle-le dans le terminal.</p>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const error = params.get("error");
  const errorDesc = params.get("error_description");
  const el = document.getElementById("content");

  if (code) {
    el.innerHTML =
      '<p class="ok">✓ Autorisation réussie. Voici ton code :</p>' +
      '<div class="box" id="code">' + code + '</div>' +
      '<button onclick="copy()">Copier le code</button>';
    window.copy = function () {
      navigator.clipboard.writeText(code).then(function () {
        document.querySelector("button").textContent = "Copié ✓";
      });
    };
  } else if (error) {
    el.innerHTML =
      '<p class="err">✗ Erreur : ' + error + '</p>' +
      (errorDesc ? '<div class="box">' + decodeURIComponent(errorDesc) + '</div>' : '') +
      '<p>Relance la commande dans le terminal et réessaie.</p>';
  } else {
    el.innerHTML =
      '<p class="err">Aucun code trouvé dans l\'URL.</p>' +
      '<p>Ouvre cette page via le lien d\'autorisation généré par l\'outil, pas directement.</p>';
  }
</script>
</body>
</html>
